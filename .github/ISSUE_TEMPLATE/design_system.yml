name: 디자인 시스템
description: 색상, 글꼴, 간격, 컴포넌트 규칙을 요청하거나 변경합니다.
title: "[디자인 시스템] "
labels: ["design-system"]
body:
  - type: dropdown
    id: token_type
    attributes:
      label: 토큰 유형
      options:
        - 색상
        - 글꼴
        - 간격
        - 모양
        - 컴포넌트
        - 시스템 UI
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: 현재 규칙
      description: 현재는 어떻게 되어 있나요?
  - type: textarea
    id: requested
    attributes:
      label: 요청 규칙
      description: 어떻게 변경되어야 하나요?
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 스크린샷, Figma 링크, 메모 등을 첨부해주세요.
  - type: textarea
    id: impact
    attributes:
      label: 영향 범위
      placeholder: 어떤 화면이나 컴포넌트에 영향을 주나요?
