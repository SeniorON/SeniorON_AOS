<svg xmlns="http://www.w3.org/2000/svg" width="960" height="1160" viewBox="0 0 960 1160">
  <style>
    text {
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }
  </style>
  <rect width="960" height="1160" fill="#f6f8fa"/>

  <rect x="80" y="48" width="800" height="96" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="112" y="92" font-size="26" font-weight="700" fill="#24292f">버그 제보</text>
  <text x="112" y="124" font-size="16" fill="#57606a">사용자에게 보이는 버그나 회귀를 제보합니다.</text>

  <rect x="80" y="176" width="800" height="72" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <text x="112" y="206" font-size="14" font-weight="700" fill="#24292f">제목</text>
  <text x="112" y="232" font-size="18" fill="#57606a">[버그] </text>

  <g>
    <rect x="80" y="280" width="800" height="148" rx="8" fill="#ffffff" stroke="#d0d7de"/>
    <text x="112" y="315" font-size="17" font-weight="700" fill="#24292f">요약</text>
    <text x="154" y="315" font-size="14" fill="#cf222e">*</text>
    <text x="112" y="342" font-size="14" fill="#57606a">어떤 문제가 발생했나요?</text>
    <rect x="112" y="362" width="736" height="42" rx="6" fill="#ffffff" stroke="#d0d7de"/>
    <text x="128" y="388" font-size="14" fill="#8c959f">예시: 올바른 가족코드를 입력해도 버튼이 비활성화 상태로 유지됩니다.</text>
  </g>

  <g>
    <rect x="80" y="460" width="800" height="190" rx="8" fill="#ffffff" stroke="#d0d7de"/>
    <text x="112" y="495" font-size="17" font-weight="700" fill="#24292f">재현 방법</text>
    <text x="184" y="495" font-size="14" fill="#cf222e">*</text>
    <rect x="112" y="518" width="736" height="104" rx="6" fill="#ffffff" stroke="#d0d7de"/>
    <text x="128" y="548" font-size="14" fill="#8c959f">1. 앱을 실행합니다.</text>
    <text x="128" y="576" font-size="14" fill="#8c959f">2. 자녀 모드를 선택합니다.</text>
    <text x="128" y="604" font-size="14" fill="#8c959f">3. 가족코드를 입력합니다.</text>
  </g>

  <g>
    <rect x="80" y="682" width="800" height="124" rx="8" fill="#ffffff" stroke="#d0d7de"/>
    <text x="112" y="717" font-size="17" font-weight="700" fill="#24292f">기대 결과</text>
    <text x="184" y="717" font-size="14" fill="#cf222e">*</text>
    <rect x="112" y="740" width="736" height="42" rx="6" fill="#ffffff" stroke="#d0d7de"/>
  </g>

  <g>
    <rect x="80" y="838" width="800" height="124" rx="8" fill="#ffffff" stroke="#d0d7de"/>
    <text x="112" y="873" font-size="17" font-weight="700" fill="#24292f">실제 결과</text>
    <text x="184" y="873" font-size="14" fill="#cf222e">*</text>
    <rect x="112" y="896" width="736" height="42" rx="6" fill="#ffffff" stroke="#d0d7de"/>
  </g>

  <g>
    <rect x="80" y="994" width="382" height="104" rx="8" fill="#ffffff" stroke="#d0d7de"/>
    <text x="112" y="1029" font-size="17" font-weight="700" fill="#24292f">기기 / OS</text>
    <rect x="112" y="1052" width="318" height="34" rx="6" fill="#ffffff" stroke="#d0d7de"/>
    <text x="128" y="1075" font-size="13" fill="#8c959f">Galaxy S24, Android 15</text>
  </g>

  <g>
    <rect x="498" y="994" width="382" height="104" rx="8" fill="#ffffff" stroke="#d0d7de"/>
    <text x="530" y="1029" font-size="17" font-weight="700" fill="#24292f">스크린샷 또는 화면 녹화</text>
    <rect x="530" y="1052" width="318" height="34" rx="6" fill="#ffffff" stroke="#d0d7de"/>
  </g>
</svg>
